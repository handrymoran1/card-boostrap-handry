 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Card Personal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow-lg border-0" style="width: 20rem; border-radius: 20px; overflow: hidden;">
        <img src="tu-foto.jpg" class="card-img-top" alt="Mi Foto" style="height: 250px; object-fit: cover;">
        
        <div class="card-body text-center">
            <h5 class="card-title fw-bold">Handry <i class="bi bi-patch-check-fill text-primary"></i></h5>
            <p class="text-muted small">Frontend Developer & Designer</p>
            
            <p class="card-text text-secondary" style="font-size: 0.9rem;">
                Apasionada por crear interfaces limpias y funcionales. Enfocada en la simplicidad y la experiencia del usuario.
            </p>

            <div class="d-flex justify-content-around my-3 border-top pt-3">
                <div>
                    <span class="fw-bold d-block">12</span>
                    <small class="text-muted">Proyectos</small>
                </div>
                <div>
                    <span class="fw-bold d-block">85</span>
                    <small class="text-muted">Commits</small>
                </div>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-center">
                <a href="mailto:handrymoran1@gmail.com" class="btn btn-outline-dark btn-sm rounded-pill px-3">
                    <i class="bi bi-envelope"></i> Email
                </a>
                <a href="https://github.com/handrymoran1" class="btn btn-dark btn-sm rounded-pill px-3">
                    <i class="bi bi-github"></i> GitHub
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
